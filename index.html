<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brick Breaker | Portfolio Demo</title>
    <style>
        body {
            margin: 0; padding: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; height: 100vh;
            background-color: #0f172a; color: #fff; font-family: sans-serif;
            overflow: hidden; touch-action: none;
        }
        canvas {
            background: #000; border: 4px solid #334155; border-radius: 8px;
            max-width: 95vw; max-height: 70vh;
        }
        .ui { margin-bottom: 15px; text-align: center; font-size: 1.5rem; color: #38bdf8; }
    </style>
</head>
<body>
    <div class="ui">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");

        // Game Configuration
        canvas.width = 480; canvas.height = 320;
        let x = canvas.width / 2, y = canvas.height - 30;
        let dx = 3, dy = -3, score = 0;
        let paddleWidth = 85, paddleX = (canvas.width - paddleWidth) / 2;
        const brickRowCount = 3, brickColumnCount = 5;
        const brickWidth = 75, brickHeight = 20, bricks = [];

        for (let c = 0; c < brickColumnCount; c++) {
            bricks[c] = [];
            for (let r = 0; r < brickRowCount; r++) bricks[c][r] = { x: 0, y: 0, status: 1 };
        }

        // Input Handlers (Mouse & Touch)
        const movePaddle = (clientX) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            let relativeX = (clientX - rect.left) * scaleX;
            paddleX = Math.max(0, Math.min(relativeX - paddleWidth / 2, canvas.width - paddleWidth));
        };
        document.addEventListener("mousemove", e => movePaddle(e.clientX));
        canvas.addEventListener("touchmove", e => { e.preventDefault(); movePaddle(e.touches[0].clientX); }, { passive: false });

	function drawGameOver() {
	    ctx.fillStyle = "#ff0000"; // Red text
	    ctx.font = "bold 40px sans-serif";
	    ctx.textAlign = "center";
	    ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2);
	    
	    ctx.font = "20px sans-serif";
	    
	    // Listen for next interaction to restart
	    const restart = () => document.location.reload();
	    canvas.addEventListener("mousedown", restart);
	    canvas.addEventListener("touchstart", restart);
	}

        // Game Loop
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Draw Bricks
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    if (bricks[c][r].status === 1) {
                        let brickX = c * (brickWidth + 10) + 30;
                        let brickY = r * (brickHeight + 10) + 30;
                        bricks[c][r].x = brickX; bricks[c][r].y = brickY;
                        ctx.fillStyle = "#0ea5e9";
                        ctx.fillRect(brickX, brickY, brickWidth, brickHeight);
                        // Collision
                        if (x > brickX && x < brickX + brickWidth && y > brickY && y < brickY + brickHeight) {
                            dy = -dy; bricks[c][r].status = 0;
                            score += 10; scoreEl.innerText = score;
                        }
                    }
                }
            }
            // Draw Ball & Paddle
            ctx.beginPath(); ctx.arc(x, y, 8, 0, Math.PI * 2); ctx.fillStyle = "#38bdf8"; ctx.fill(); ctx.closePath();
            ctx.fillStyle = "#f1f5f9"; ctx.fillRect(paddleX, canvas.height - 12, paddleWidth, 12);
            
            // Physics
            if (x + dx > canvas.width - 8 || x + dx < 8) dx = -dx;
            if (y + dy < 8) dy = -dy;
            else if (y + dy > canvas.height - 12 - 8) {
                if (x > paddleX && x < paddleX + paddleWidth) dy = -dy;
                else if (y + dy > canvas.height) {
            drawGameOver(); // Call custom red text function
            return;        // CRITICAL: Stop the requestAnimationFrame loop

		}
            }
            x += dx; y += dy;
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
